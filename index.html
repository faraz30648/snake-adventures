<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Adventures</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ecf0f1;
            user-select: none;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(14px, 2.5vw, 24px);
            margin-bottom: 15px;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
            text-align: center;
        }

        #game-container {
            width: 100%;
            /* Widescreen fix: caps width based on viewport to maintain 2:1 aspect ratio */
            max-width: min(95vw, 140vh); 
            padding: 0 5px;
            box-sizing: border-box;
        }

        #dashboard {
            display: flex;
            justify-content: space-between;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(8px, 1.2vw, 12px);
            margin-bottom: 10px;
            color: #ecf0f1;
        }

        .stat-box {
            background: #1abc9c;
            padding: 8px 12px;
            border-radius: 5px;
            border: 2px solid #16a085;
            box-shadow: 2px 2px 0px #000;
            display: flex;
            align-items: center;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 1; /* Changed to Widescreen 2:1 */
            background-color: #000;
            border: 4px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        #overlay h2 {
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            margin-bottom: 20px;
            font-size: clamp(16px, 3vw, 24px);
        }

        .btn {
            font-family: 'Press Start 2P', cursive;
            background: #e74c3c;
            color: white;
            border: 2px solid #c0392b;
            padding: 10px 15px;
            margin: 5px;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .btn-green { background: #2ecc71; border-color: #27ae60; }
        .btn-blue { background: #3498db; border-color: #2980b9; }
        .btn-dark { background: #34495e; border-color: #2c3e50; }
        .btn-orange { background: #e67e22; border-color: #d35400; }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        .instructions {
            margin-top: 10px;
            font-size: 12px;
            color: #bdc3c7;
            text-align: center;
            line-height: 1.4;
        }

        kbd {
            background-color: #eee;
            color: #333;
            border-radius: 3px;
            border: 1px solid #b4b4b4;
            box-shadow: 0 1px 1px rgba(0,0,0,.2), 0 2px 0 0 rgba(255,255,255,.7) inset;
            font-family: monospace;
            padding: 2px 4px;
            font-weight: 700;
        }
        
        .powerup-guide span { margin: 0 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>SNAKE ADVENTURES</h1>

    <div id="game-container">
        <div id="dashboard">
            <div class="stat-box">LVL: <span id="level">1</span></div>
            <div class="stat-box">SCORE: <span id="score">0</span></div>
            <div class="stat-box">HIGH: <span id="high-score">0</span></div>
        </div>
        
        <div id="canvas-wrapper">
            <!-- Increased width to 800 for 2:1 widescreen -->
            <canvas id="gameCanvas" width="800" height="400"></canvas>
            <div id="overlay">
                <h2 id="overlay-title">PAUSED</h2>
                <div id="final-score" style="display: none; font-family: 'Press Start 2P', cursive; margin-bottom: 20px; color: #f1c40f; font-size: 14px;"></div>
                <button id="btn-resume" class="btn btn-green">RESUME</button>
                <button id="btn-restart" class="btn">START OVER</button>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button id="btn-pause-toggle" class="btn">PAUSE (P)</button>
        <button id="btn-music" class="btn btn-dark">🎵 MUSIC: ON</button>
        <button id="btn-sfx" class="btn btn-dark">🔊 SFX: ON</button>
        <button id="btn-fullscreen" class="btn btn-blue">FULLSCREEN (F)</button>
        <button id="btn-reset-high" class="btn btn-orange">RESET HIGH</button>
    </div>

    <div class="instructions">
        Use <kbd>Arrows</kbd> to move. Wraps through edges.<br>
        <div class="powerup-guide" style="margin-top:5px; font-size: 11px;">
            <span style="color:#e74c3c;">Grow(Red)</span>
            <span style="color:#3498db;">Shrink(Blu)</span>
            <span style="color:#f1c40f;">Fast(Yel)</span>
            <span style="color:#00ffff;">Slow(Cyn)</span>
            <span style="color:#fff;">Ghost(Wht)</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const btnResume = document.getElementById("btn-resume");
        const btnRestart = document.getElementById("btn-restart");
        const finalScoreText = document.getElementById("final-score");

        let snake, dx, dy, foodX, foodY, score, levelScore, level, gameLoop, baseGameSpeed;
        let obstacles = [];
        let movingObstacles = [];
        let changingDirection = false;
        let isGameOver = false;
        let isPaused = false;
        let tickCounter = 0;
        let bgPattern = null;
        let growQueue = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;

        // Bonus Level State
        let isBonusLevel = false;
        let exitX = -100, exitY = -100;

        // Powerup State
        let currentPowerUp = null;
        let activeEffect = { type: null, ticksRemaining: 0 }; 
        const POWERUP_TYPES = ['shrink', 'grow', 'slow', 'fast', 'ghost'];

        document.getElementById('high-score').innerText = highScore;

        // --- AUDIO ENGINE ---
        let audioCtx;
        let sfxEnabled = true;
        let musicEnabled = true;
        let jazzTimer;
        let jazzStep = 0;
        // Swing bass notes (Frequencies)
        const jazzNotes = [130.81, 0, 155.56, 155.56, 0, 196.00, 0, 155.56]; 

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                scheduleJazz();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol=0.1) {
            if (!sfxEnabled || !audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playEatSFX() {
            playTone(600, 'square', 0.1, 0.05);
            setTimeout(() => playTone(900, 'square', 0.1, 0.05), 50);
        }

        function playPowerupSFX() {
            playTone(400, 'sine', 0.1, 0.1);
            setTimeout(() => playTone(600, 'sine', 0.1, 0.1), 80);
            setTimeout(() => playTone(800, 'sine', 0.2, 0.1), 160);
        }

        function playDeathSFX() {
            playTone(200, 'sawtooth', 0.3, 0.1);
            setTimeout(() => playTone(150, 'sawtooth', 0.4, 0.1), 200);
        }

        function scheduleJazz() {
            if (jazzTimer) clearInterval(jazzTimer);
            jazzTimer = setInterval(() => {
                if (musicEnabled && !isPaused && !isGameOver && audioCtx) {
                    let freq = jazzNotes[jazzStep % jazzNotes.length];
                    if (freq > 0) {
                        // Bass
                        let osc = audioCtx.createOscillator();
                        let gain = audioCtx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.3);
                    }
                    // Jazzy hi-hat on upbeat
                    if (jazzStep % 2 !== 0) {
                        let hh = audioCtx.createOscillator();
                        let hGain = audioCtx.createGain();
                        hh.type = 'square';
                        hh.frequency.value = 8000; // White noise-ish
                        hGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                        hGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                        hh.connect(hGain);
                        hGain.connect(audioCtx.destination);
                        hh.start();
                        hh.stop(audioCtx.currentTime + 0.05);
                    }
                    jazzStep++;
                }
            }, 300); // tempo
        }

        // --- BUTTON LISTENERS ---
        document.getElementById("btn-music").addEventListener("click", (e) => {
            initAudio();
            musicEnabled = !musicEnabled;
            e.target.innerText = musicEnabled ? "🎵 MUSIC: ON" : "🎵 MUSIC: OFF";
        });
        document.getElementById("btn-sfx").addEventListener("click", (e) => {
            initAudio();
            sfxEnabled = !sfxEnabled;
            e.target.innerText = sfxEnabled ? "🔊 SFX: ON" : "🔊 SFX: OFF";
        });
        document.getElementById("btn-reset-high").addEventListener("click", () => {
            if(confirm("Are you sure you want to reset your High Score?")) {
                highScore = 0;
                localStorage.setItem('snakeHighScore', 0);
                document.getElementById('high-score').innerText = "0";
            }
        });


        const biomes = [
            { name: "Grass", bg: "#7cb342", accent: "#558b2f", snakeHead: "#0d47a1", snakeBody: "#1976d2", food: "#e74c3c", foodLeaf: "#2ecc71" },
            { name: "Clay", bg: "#d84315", accent: "#bf360c", snakeHead: "#1b5e20", snakeBody: "#4caf50", food: "#f1c40f", foodLeaf: "#fff" },
            { name: "Water", bg: "#0288d1", accent: "#0277bd", snakeHead: "#e65100", snakeBody: "#ff9800", food: "#f1c40f", foodLeaf: "#2ecc71" },
            { name: "Stone", bg: "#757575", accent: "#616161", snakeHead: "#4a148c", snakeBody: "#9c27b0", food: "#64dd17", foodLeaf: "#1b5e20" }
        ];

        if (!loadState()) resetGame();

        // Inputs
        document.addEventListener("keydown", (e) => {
            initAudio(); // Starts audio on first interaction
            changeDirection(e);
            if(e.code === "KeyP") togglePause();
            if(e.code === "KeyF") toggleFullScreen();
        });
        
        document.getElementById("btn-pause-toggle").addEventListener("click", () => { initAudio(); togglePause(); });
        document.getElementById("btn-fullscreen").addEventListener("click", () => { initAudio(); toggleFullScreen(); });
        btnResume.addEventListener("click", () => { initAudio(); togglePause(); });
        btnRestart.addEventListener("click", () => { initAudio(); resetGame(); });

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && !isGameOver) {
                if (!isPaused) togglePause();
                saveState();
            }
        });
        window.addEventListener("beforeunload", () => {
            if (!isGameOver) saveState();
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function saveState() {
            if (isGameOver) {
                localStorage.removeItem('snakeSaveData');
                return;
            }
            const state = {
                snake, dx, dy, foodX, foodY, score, levelScore, level,
                obstacles, movingObstacles, baseGameSpeed, currentPowerUp, 
                activeEffect, tickCounter, growQueue, isBonusLevel, exitX, exitY
            };
            localStorage.setItem('snakeSaveData', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('snakeSaveData');
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    snake = state.snake; dx = state.dx; dy = state.dy;
                    foodX = state.foodX; foodY = state.foodY;
                    score = state.score; levelScore = state.levelScore; level = state.level;
                    obstacles = state.obstacles; movingObstacles = state.movingObstacles;
                    baseGameSpeed = state.baseGameSpeed; currentPowerUp = state.currentPowerUp;
                    activeEffect = state.activeEffect || { type: null, ticksRemaining: 0 };
                    tickCounter = state.tickCounter; growQueue = state.growQueue || 0;
                    isBonusLevel = state.isBonusLevel || false;
                    exitX = state.exitX || -100; exitY = state.exitY || -100;
                    
                    document.getElementById('score').innerText = score;
                    document.getElementById('level').innerText = level;
                    generateBackgroundPattern(biomes[(level - 1) % biomes.length]);
                    
                    isPaused = true;
                    showPauseMenu("GAME PAUSED");
                    return true;
                } catch(e) {
                    localStorage.removeItem('snakeSaveData');
                }
            }
            return false;
        }

        function generateBackgroundPattern(biome) {
            const pCan = document.createElement('canvas');
            pCan.width = 40; pCan.height = 40;
            const pCtx = pCan.getContext('2d');

            pCtx.fillStyle = biome.bg; pCtx.fillRect(0, 0, 40, 40);
            pCtx.fillStyle = biome.accent;

            if (biome.name === "Grass") { pCtx.fillRect(5, 5, 2, 6); pCtx.fillRect(25, 20, 2, 6); } 
            else if (biome.name === "Clay") { pCtx.beginPath(); pCtx.arc(10, 10, 2, 0, Math.PI*2); pCtx.fill(); pCtx.beginPath(); pCtx.arc(30, 25, 3, 0, Math.PI*2); pCtx.fill(); } 
            else if (biome.name === "Water") { pCtx.fillRect(0, 10, 10, 2); pCtx.fillRect(20, 30, 15, 2); } 
            else if (biome.name === "Stone") { pCtx.strokeStyle = biome.accent; pCtx.strokeRect(0, 0, 20, 20); pCtx.strokeRect(20, 20, 20, 20); }
            bgPattern = ctx.createPattern(pCan, 'repeat');
        }

        function main() {
            if (isGameOver || isPaused) return;

            if (levelScore >= 100) {
                level++;
                if (level > 100) { endGame("VICTORY!"); return; }
                initLevel(false); 
                return; 
            }

            changingDirection = false;
            
            let currentSpeed = baseGameSpeed;
            if (activeEffect.ticksRemaining > 0) {
                if (activeEffect.type === 'slow') currentSpeed *= 1.8;
                if (activeEffect.type === 'fast') currentSpeed *= 0.5;
                activeEffect.ticksRemaining--;
                if (activeEffect.ticksRemaining <= 0) activeEffect.type = null;
            }

            if (currentPowerUp && (tickCounter - currentPowerUp.spawnTick > 100)) {
                currentPowerUp = null;
            }

            if (tickCounter % 20 === 0) saveState();

            gameLoop = setTimeout(function onTick() {
                if (isPaused) return; 
                tickCounter++;
                drawBackground();
                
                if (isBonusLevel) drawExitPortal();
                
                updateMovingObstacles();
                drawObstacles();
                drawPowerUp();
                drawFood();
                advanceSnake();
                drawSnake();
                drawHUD(); 
                
                if (hasGameEnded()) {
                    playDeathSFX();
                    endGame("GAME OVER");
                    return;
                }
                main();
            }, currentSpeed);
        }

        function showPauseMenu(title) {
            overlayTitle.innerText = title;
            finalScoreText.style.display = "none";
            btnResume.style.display = "inline-block";
            overlay.style.display = "flex";
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            
            if (isPaused) {
                clearTimeout(gameLoop);
                showPauseMenu("PAUSED");
                saveState();
            } else {
                overlay.style.display = "none";
                main();
            }
        }

        function endGame(title) {
            isGameOver = true;
            clearTimeout(gameLoop);
            localStorage.removeItem('snakeSaveData'); 
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('high-score').innerText = highScore;
            }

            overlayTitle.innerText = title;
            finalScoreText.innerText = "FINAL SCORE: " + score;
            finalScoreText.style.display = "block";
            btnResume.style.display = "none";
            overlay.style.display = "flex";
        }

        function initLevel(isFullReset = true) {
            clearTimeout(gameLoop);
            levelScore = 0;
            currentPowerUp = null;
            activeEffect = { type: null, ticksRemaining: 0 };
            document.getElementById('level').innerText = level;
            
            isBonusLevel = (level > 0 && level % 5 === 0);
            
            const currentBiome = biomes[(level - 1) % biomes.length];
            generateBackgroundPattern(currentBiome);
            
            baseGameSpeed = Math.max(45, 110 - (level * 1.2)); 
            
            if (isFullReset) {
                snake = [{x: 400, y: 200}, {x: 390, y: 200}, {x: 380, y: 200}];
                dx = 10; dy = 0; growQueue = 0;
            }
            
            if (isBonusLevel) {
                generateBonusMaze();
            } else {
                generateHardObstacles();
            }
            
            genFood();
            main();
        }

        function drawBackground() {
            ctx.fillStyle = bgPattern;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawExitPortal() {
            let pulse = Math.abs(Math.sin(tickCounter * 0.2)) * 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#9b59b6";
            
            ctx.fillStyle = "#8e44ad";
            ctx.fillRect(exitX - (pulse/2), exitY - (pulse/2), 10 + pulse, 10 + pulse);
            
            ctx.fillStyle = "#e056fd";
            ctx.fillRect(exitX + 2, exitY + 2, 6, 6);
            ctx.shadowBlur = 0;
        }

        function drawHUD() {
            if (isBonusLevel) {
                ctx.fillStyle = "#f1c40f";
                ctx.font = "12px 'Press Start 2P'";
                ctx.textAlign = "center";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#000";
                ctx.fillText("BONUS MAZE: FIND EXIT!", canvas.width/2, 30);
                ctx.shadowBlur = 0;
            }
            
            if (activeEffect.type && activeEffect.ticksRemaining > 0) {
                ctx.font = "14px 'Press Start 2P'";
                ctx.textAlign = "center";
                ctx.shadowBlur = 5;
                ctx.shadowColor = "#000";
                
                let timeSec = Math.ceil(activeEffect.ticksRemaining / (1000 / baseGameSpeed));
                let color = "white";
                let text = "";
                
                if (activeEffect.type === 'grow') { color = "#e74c3c"; text = "GROWN!"; }
                else if (activeEffect.type === 'shrink') { color = "#3498db"; text = "SHRUNK!"; }
                else if (activeEffect.type === 'fast') { color = "#f1c40f"; text = `FAST: ${timeSec}s`; }
                else if (activeEffect.type === 'slow') { color = "#00ffff"; text = `SLOW: ${timeSec}s`; }
                else if (activeEffect.type === 'ghost') { color = "#ffffff"; text = `GHOST: ${timeSec}s`; }
                
                ctx.fillStyle = color;
                ctx.fillText(text, canvas.width/2, isBonusLevel ? 55 : 30);
                
                ctx.textAlign = "left";
                ctx.shadowBlur = 0;
            }
        }

        function drawSnake() {
            const currentBiome = biomes[(level - 1) % biomes.length];
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? currentBiome.snakeHead : currentBiome.snakeBody;
                
                if (activeEffect.type === 'ghost' && activeEffect.ticksRemaining > 0) {
                    ctx.globalAlpha = 0.7; 
                }
                
                ctx.beginPath();
                ctx.roundRect(part.x, part.y, 10, 10, 3);
                ctx.fill();

                if (index === 0) {
                    ctx.fillStyle = "white";
                    if (dx === 10) { ctx.fillRect(part.x+6, part.y+2, 2, 2); ctx.fillRect(part.x+6, part.y+6, 2, 2); }
                    else if (dx === -10) { ctx.fillRect(part.x+2, part.y+2, 2, 2); ctx.fillRect(part.x+2, part.y+6, 2, 2); }
                    else if (dy === 10) { ctx.fillRect(part.x+2, part.y+6, 2, 2); ctx.fillRect(part.x+6, part.y+6, 2, 2); }
                    else if (dy === -10) { ctx.fillRect(part.x+2, part.y+2, 2, 2); ctx.fillRect(part.x+6, part.y+2, 2, 2); }
                }
                ctx.globalAlpha = 1.0;
            });
        }

        function drawObstacles() {
            if (activeEffect.type === 'ghost' && activeEffect.ticksRemaining > 0) {
                ctx.globalAlpha = 0.25; 
            }

            obstacles.forEach(obs => {
                ctx.fillStyle = "#95a5a6";
                ctx.fillRect(obs.x, obs.y, 10, 10);
                ctx.fillStyle = "#bdc3c7";
                ctx.fillRect(obs.x, obs.y, 10, 2);
                ctx.fillRect(obs.x, obs.y, 2, 10);
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(obs.x, obs.y+8, 10, 2);
                ctx.fillRect(obs.x+8, obs.y, 2, 10);
            });

            movingObstacles.forEach(mo => {
                ctx.fillStyle = "#e74c3c";
                ctx.beginPath();
                ctx.arc(mo.x + 5, mo.y + 5, 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.fillRect(mo.x+4, mo.y, 2, 2);
                ctx.fillRect(mo.x+4, mo.y+8, 2, 2);
                ctx.fillRect(mo.x, mo.y+4, 2, 2);
                ctx.fillRect(mo.x+8, mo.y+4, 2, 2);
            });

            ctx.globalAlpha = 1.0;
        }

        function drawPowerUp() {
            if (!currentPowerUp) return;
            
            let color;
            if (currentPowerUp.type === 'grow') color = "#e74c3c";
            else if (currentPowerUp.type === 'shrink') color = "#3498db"; 
            else if (currentPowerUp.type === 'fast') color = "#f1c40f"; 
            else if (currentPowerUp.type === 'slow') color = "#00ffff"; 
            else if (currentPowerUp.type === 'ghost') color = "#ffffff"; 

            let lifeLeft = 100 - (tickCounter - currentPowerUp.spawnTick);
            let pulseSpeed = lifeLeft < 30 ? 0.8 : 0.2; 
            let pulse = Math.abs(Math.sin(tickCounter * pulseSpeed)) * 3;
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            
            ctx.beginPath();
            ctx.arc(currentPowerUp.x + 5, currentPowerUp.y + 5, 4 + pulse, 0, Math.PI * 2);
            ctx.fill();
            
            // Adding a crisp white outline so it never blends in
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#ffffff";
            ctx.stroke();

            ctx.shadowBlur = 0; 
        }

        function drawFood() {
            const currentBiome = biomes[(level - 1) % biomes.length];
            const isLastFruit = (!isBonusLevel && levelScore === 90);
            
            let scale = 1;
            let pulseOffset = 0;
            
            if (isLastFruit) {
                scale = 1.5; 
                pulseOffset = Math.abs(Math.sin(tickCounter * 0.15)) * 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#f1c40f";
            }

            let cx = foodX + 5;
            let cy = foodY + 5;
            let r = (4 * scale) + pulseOffset;

            ctx.fillStyle = currentBiome.food; 
            ctx.beginPath();
            ctx.arc(cx, cy + (1*scale), r, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = currentBiome.foodLeaf; 
            ctx.beginPath();
            ctx.ellipse(cx + (2*scale), cy - (3*scale), 3*scale, 1.5*scale, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
        }

        function advanceSnake() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0) head.x = canvas.width - 10;
            else if (head.x >= canvas.width) head.x = 0;
            
            if (head.y < 0) head.y = canvas.height - 10;
            else if (head.y >= canvas.height) head.y = 0;

            snake.unshift(head);
            
            if (isBonusLevel && Math.abs(head.x - exitX) < 10 && Math.abs(head.y - exitY) < 10) {
                levelScore = 100;
                snake.pop(); 
                return;
            }

            if (head.x === foodX && head.y === foodY) {
                playEatSFX();
                score += 10;
                if (!isBonusLevel) levelScore += 10; 
                document.getElementById('score').innerText = score;
                
                if (!currentPowerUp && Math.random() < 0.25) {
                    genPowerUp();
                }
                genFood();
            } else if (growQueue > 0) {
                growQueue--;
            } else {
                snake.pop();
            }

            if (currentPowerUp && head.x === currentPowerUp.x && head.y === currentPowerUp.y) {
                playPowerupSFX();
                applyPowerUp(currentPowerUp.type);
                currentPowerUp = null;
            }
        }

        function applyPowerUp(type) {
            if (type === 'shrink') {
                snake = snake.slice(0, Math.max(3, Math.floor(snake.length / 2)));
                activeEffect = { type: type, ticksRemaining: 20 }; 
            } else if (type === 'grow') {
                growQueue += 5; 
                activeEffect = { type: type, ticksRemaining: 20 }; 
            } else {
                activeEffect = { type: type, ticksRemaining: 100 }; 
            }
        }

        function updateMovingObstacles() {
            if (tickCounter % 2 === 0) {
                movingObstacles.forEach(mo => {
                    mo.x += mo.dx;
                    if (mo.x < 0) mo.x = canvas.width - 10;
                    if (mo.x >= canvas.width) mo.x = 0;
                });
            }
        }

        function randomTen(min, max) { return Math.round((Math.random() * (max - min) + min) / 10) * 10; }

        function isOccupied(x, y) {
            let onSnake = snake.some(p => p.x === x && p.y === y);
            let onObstacle = obstacles.some(o => o.x === x && o.y === y);
            let onMoving = movingObstacles.some(m => Math.abs(m.x - x) < 10 && Math.abs(m.y - y) < 10);
            let onFood = (x === foodX && y === foodY); 
            let onExit = isBonusLevel && (Math.abs(x - exitX) < 20 && Math.abs(y - exitY) < 20);
            return onSnake || onObstacle || onMoving || onFood || onExit;
        }

        function genFood() {
            let newX, newY, attempts = 0;
            do {
                newX = randomTen(0, canvas.width - 10);
                newY = randomTen(0, canvas.height - 10);
                attempts++;
            } while (isOccupied(newX, newY) && attempts < 200);
            foodX = newX; foodY = newY;
        }

        function genPowerUp() {
            let px, py, attempts = 0;
            do {
                px = randomTen(0, canvas.width - 10);
                py = randomTen(0, canvas.height - 10);
                attempts++;
            } while (isOccupied(px, py) && attempts < 200);
            
            if (attempts < 200) {
                let type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                currentPowerUp = { x: px, y: py, type: type, spawnTick: tickCounter };
            }
        }

        function isSafeSpawn(x, y) {
            if (snake.some(p => p.x === x && p.y === y)) return false;
            let head = snake[0];
            let dist = Math.abs(head.x - x) + Math.abs(head.y - y);
            if (dist < 80) return false; // Increased safe radius for widescreen
            return true;
        }

        function generateBonusMaze() {
            obstacles = [];
            movingObstacles = [];
            
            // Build Outer Walls 800x400
            for(let i=0; i<80; i++) {
                if (i !== 5 && i !== 75) obstacles.push({x: i*10, y: 0});
                if (i !== 5 && i !== 75) obstacles.push({x: i*10, y: 390});
            }
            for(let i=0; i<40; i++) {
                if (i !== 5 && i !== 35) obstacles.push({x: 0, y: i*10});
                if (i !== 5 && i !== 35) obstacles.push({x: 790, y: i*10});
            }
            
            // Build an "S" shaped heavy maze spanning the wide screen
            for(let i=0; i<65; i++) {
                obstacles.push({x: i*10, y: 100}); 
                obstacles.push({x: i*10, y: 110}); 
                
                obstacles.push({x: 800 - (i*10) - 10, y: 200}); 
                obstacles.push({x: 800 - (i*10) - 10, y: 210}); 
                
                obstacles.push({x: i*10, y: 300}); 
                obstacles.push({x: i*10, y: 310}); 
            }
            
            snake = [{x: 40, y: 50}, {x: 30, y: 50}, {x: 20, y: 50}];
            dx = 10; dy = 0;
            
            exitX = 750; 
            exitY = 350;
        }

        function generateHardObstacles() {
            obstacles = [];
            movingObstacles = [];
            let difficulty = Math.floor((level - 1) / 10); 
            
            const add = (x, y) => {
                if (x >= 0 && x < 80 && y >= 0 && y < 40 && isSafeSpawn(x * 10, y * 10)) {
                    obstacles.push({x: x * 10, y: y * 10});
                }
            };

            const drawLine = (x1, y1, length, isHorizontal) => {
                for(let i=0; i<length; i++) {
                    if (isHorizontal) add(x1 + i, y1);
                    else add(x1, y1 + i);
                }
            };
            const drawBox = (x, y, w, h) => {
                drawLine(x, y, w, true); drawLine(x, y+h-1, w, true);
                drawLine(x, y, h, false); drawLine(x+w-1, y, h, false);
            };

            if (difficulty === 0) {
                // Tier 1
                for(let i=0; i<8; i++) drawLine(Math.floor(Math.random()*70), Math.floor(Math.random()*35), 6, Math.random()>0.5);
            } else if (difficulty === 1) {
                // Tier 2: Large Corner Blocks
                drawBox(2, 2, 15, 15); drawBox(63, 23, 15, 15);
                drawBox(63, 2, 15, 15); drawBox(2, 23, 15, 15);
            } else if (difficulty === 2) {
                // Tier 3: Widescreen Corridors
                drawLine(10, 0, 30, false); drawLine(70, 10, 30, false);
                drawLine(25, 20, 30, true); drawLine(25, 30, 30, true);
            } else if (difficulty === 3) {
                // Tier 4: Concentric broken boxes spanning center
                drawBox(10, 5, 60, 30);
                drawBox(15, 10, 50, 20);
                // Cut holes for pathing
                obstacles = obstacles.filter(o => !(o.y === 190 || o.y === 200 || o.x === 390 || o.x === 400));
            } else if (difficulty === 4) {
                // Tier 5: Massive crosshairs
                for(let mx of [20, 40, 60]) {
                    for(let my of [10, 30]) {
                        drawLine(mx-5, my, 11, true); drawLine(mx, my-5, 11, false);
                    }
                }
            } else if (difficulty >= 5) {
                // Tier 6: Heavy intense mazes across the 800px width
                for(let i=0; i<15; i++) {
                    let rx = Math.floor(Math.random()*70);
                    let ry = Math.floor(Math.random()*30);
                    drawLine(rx, ry, Math.floor(Math.random()*8)+5, Math.random()>0.5);
                    drawLine(rx, ry, Math.floor(Math.random()*8)+5, Math.random()>0.5);
                }
            }

            if (difficulty >= 2) {
                let numCrawlers = difficulty * 3; 
                for(let i=0; i < numCrawlers; i++) {
                    let mx, my, attempts = 0;
                    do {
                        mx = randomTen(0, canvas.width - 10);
                        my = randomTen(0, canvas.height - 10);
                        attempts++;
                    } while (!isSafeSpawn(mx, my) && attempts < 200);
                    
                    movingObstacles.push({ x: mx, y: my, dx: Math.random() > 0.5 ? 10 : -10 });
                }
            }
        }

        function changeDirection(event) {
            if (isPaused) return;
            const LEFT_KEY = 37, RIGHT_KEY = 39, UP_KEY = 38, DOWN_KEY = 40;

            if (changingDirection) return;
            const keyPressed = event.keyCode;
            const goingUp = dy === -10, goingDown = dy === 10, goingRight = dx === 10, goingLeft = dx === -10;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -10; dy = 0; changingDirection = true; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -10; changingDirection = true; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 10; dy = 0; changingDirection = true; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 10; changingDirection = true; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            
            if (activeEffect.type !== 'ghost' || activeEffect.ticksRemaining <= 0) {
                for (let i = 0; i < obstacles.length; i++) {
                    if (obstacles[i].x === snake[0].x && obstacles[i].y === snake[0].y) return true;
                }
                for (let i = 0; i < movingObstacles.length; i++) {
                    if (movingObstacles[i].x === snake[0].x && movingObstacles[i].y === snake[0].y) return true;
                }
            }
            return false;
        }

        function resetGame() {
            overlay.style.display = "none";
            isGameOver = false;
            isPaused = false;
            level = 1;
            score = 0;
            document.getElementById('score').innerText = score;
            localStorage.removeItem('snakeSaveData');
            initLevel(true);
        }
    </script>
</body>
