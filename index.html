<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake Adventures</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ecf0f1;
            user-select: none;
            overflow: hidden;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(16px, 3vw, 24px);
            margin-bottom: 10px;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
        }

        #game-container {
            width: 100%;
            max-width: 85vh;
            padding: 0 15px;
            box-sizing: border-box;
        }

        #dashboard {
            display: flex;
            justify-content: space-between;
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(8px, 1.5vw, 12px);
            margin-bottom: 10px;
            color: #ecf0f1;
        }

        .stat-box {
            background: #1abc9c;
            padding: 8px 12px;
            border-radius: 5px;
            border: 2px solid #16a085;
            box-shadow: 2px 2px 0px #000;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000;
            border: 4px solid #34495e;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
        }

        #overlay h2 {
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            margin-bottom: 20px;
            font-size: clamp(16px, 3vw, 24px);
        }

        .btn {
            font-family: 'Press Start 2P', cursive;
            background: #e74c3c;
            color: white;
            border: 2px solid #c0392b;
            padding: 10px 20px;
            margin: 10px;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .btn-green { background: #2ecc71; border-color: #27ae60; }
        .btn-blue { background: #3498db; border-color: #2980b9; }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #bdc3c7;
            text-align: center;
            line-height: 1.4;
        }

        kbd {
            background-color: #eee;
            color: #333;
            border-radius: 3px;
            border: 1px solid #b4b4b4;
            box-shadow: 0 1px 1px rgba(0,0,0,.2), 0 2px 0 0 rgba(255,255,255,.7) inset;
            font-family: monospace;
            padding: 2px 4px;
            font-weight: 700;
        }
        
        .powerup-guide span { margin: 0 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>SNAKE ADVENTURES</h1>

    <div id="game-container">
        <div id="dashboard">
            <div class="stat-box">LVL: <span id="level">1</span></div>
            <div class="stat-box">SCORE: <span id="score">0</span></div>
            <div class="stat-box">HIGH: <span id="high-score">0</span></div>
        </div>
        
        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="overlay">
                <h2 id="overlay-title">PAUSED</h2>
                <div id="final-score" style="display: none; font-family: 'Press Start 2P', cursive; margin-bottom: 20px; color: #f1c40f; font-size: 14px;"></div>
                <button id="btn-resume" class="btn btn-green">RESUME</button>
                <button id="btn-restart" class="btn">START OVER</button>
            </div>
        </div>
    </div>
    
    <div class="controls">
        <button id="btn-pause-toggle" class="btn" style="padding: 8px 15px;">PAUSE (P)</button>
        <button id="btn-fullscreen" class="btn btn-blue" style="padding: 8px 15px;">FULLSCREEN (F)</button>
    </div>

    <div class="instructions">
        Use <kbd>Arrows</kbd> to move. Wraps through edges.<br>
        <div class="powerup-guide" style="margin-top:5px; font-size: 12px;">
            <span style="color:#e74c3c;">Grow (Red)</span>
            <span style="color:#3498db;">Shrink (Blue)</span>
            <span style="color:#f1c40f;">Fast (Yel)</span>
            <span style="color:#00ffff;">Slow (Cyan)</span>
            <span style="color:#fff;">Ghost (Wht)</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const btnResume = document.getElementById("btn-resume");
        const btnRestart = document.getElementById("btn-restart");
        const finalScoreText = document.getElementById("final-score");

        let snake, dx, dy, foodX, foodY, score, levelScore, level, gameLoop, baseGameSpeed;
        let obstacles = [];
        let movingObstacles = [];
        let changingDirection = false;
        let isGameOver = false;
        let isPaused = false;
        let tickCounter = 0;
        let bgPattern = null;
        let growQueue = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;

        // Powerup State
        let currentPowerUp = null; // {x, y, type}
        let activeEffect = { type: null, ticksRemaining: 0 }; 
        const POWERUP_TYPES = ['shrink', 'grow', 'slow', 'fast', 'ghost'];

        document.getElementById('high-score').innerText = highScore;

        const biomes = [
            { name: "Grass", bg: "#7cb342", accent: "#558b2f", snakeHead: "#0d47a1", snakeBody: "#1976d2", food: "#e74c3c", foodLeaf: "#2ecc71" },
            { name: "Clay", bg: "#d84315", accent: "#bf360c", snakeHead: "#1b5e20", snakeBody: "#4caf50", food: "#f1c40f", foodLeaf: "#fff" },
            { name: "Water", bg: "#0288d1", accent: "#0277bd", snakeHead: "#e65100", snakeBody: "#ff9800", food: "#f1c40f", foodLeaf: "#2ecc71" },
            { name: "Stone", bg: "#757575", accent: "#616161", snakeHead: "#4a148c", snakeBody: "#9c27b0", food: "#64dd17", foodLeaf: "#1b5e20" }
        ];

        // Boot Game (Check for saves)
        if (!loadState()) {
            resetGame();
        }

        // Inputs
        document.addEventListener("keydown", changeDirection);
        document.addEventListener("keydown", (e) => {
            if(e.code === "KeyP") togglePause();
            if(e.code === "KeyF") toggleFullScreen();
        });
        document.getElementById("btn-pause-toggle").addEventListener("click", togglePause);
        document.getElementById("btn-fullscreen").addEventListener("click", toggleFullScreen);
        btnResume.addEventListener("click", togglePause);
        btnRestart.addEventListener("click", resetGame);

        // Auto-pause and Save on tab switch / window close
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && !isGameOver) {
                if (!isPaused) togglePause();
                saveState();
            }
        });
        window.addEventListener("beforeunload", () => {
            if (!isGameOver) saveState();
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        function saveState() {
            if (isGameOver) {
                localStorage.removeItem('snakeSaveData');
                return;
            }
            const state = {
                snake, dx, dy, foodX, foodY, score, levelScore, level,
                obstacles, movingObstacles, baseGameSpeed, currentPowerUp, 
                activeEffect, tickCounter, growQueue
            };
            localStorage.setItem('snakeSaveData', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('snakeSaveData');
            if (saved) {
                try {
                    const state = JSON.parse(saved);
                    snake = state.snake; dx = state.dx; dy = state.dy;
                    foodX = state.foodX; foodY = state.foodY;
                    score = state.score; levelScore = state.levelScore; level = state.level;
                    obstacles = state.obstacles; movingObstacles = state.movingObstacles;
                    baseGameSpeed = state.baseGameSpeed; currentPowerUp = state.currentPowerUp;
                    activeEffect = state.activeEffect || { type: null, ticksRemaining: 0 };
                    tickCounter = state.tickCounter; growQueue = state.growQueue || 0;
                    
                    document.getElementById('score').innerText = score;
                    document.getElementById('level').innerText = level;
                    generateBackgroundPattern(biomes[(level - 1) % biomes.length]);
                    
                    isPaused = true;
                    showPauseMenu("GAME PAUSED");
                    return true;
                } catch(e) {
                    localStorage.removeItem('snakeSaveData');
                }
            }
            return false;
        }

        function generateBackgroundPattern(biome) {
            const pCan = document.createElement('canvas');
            pCan.width = 40; pCan.height = 40;
            const pCtx = pCan.getContext('2d');

            pCtx.fillStyle = biome.bg; pCtx.fillRect(0, 0, 40, 40);
            pCtx.fillStyle = biome.accent;

            if (biome.name === "Grass") { pCtx.fillRect(5, 5, 2, 6); pCtx.fillRect(25, 20, 2, 6); } 
            else if (biome.name === "Clay") { pCtx.beginPath(); pCtx.arc(10, 10, 2, 0, Math.PI*2); pCtx.fill(); pCtx.beginPath(); pCtx.arc(30, 25, 3, 0, Math.PI*2); pCtx.fill(); } 
            else if (biome.name === "Water") { pCtx.fillRect(0, 10, 10, 2); pCtx.fillRect(20, 30, 15, 2); } 
            else if (biome.name === "Stone") { pCtx.strokeStyle = biome.accent; pCtx.strokeRect(0, 0, 20, 20); pCtx.strokeRect(20, 20, 20, 20); }
            bgPattern = ctx.createPattern(pCan, 'repeat');
        }

        function main() {
            if (isGameOver || isPaused) return;

            if (levelScore >= 100) {
                level++;
                if (level > 100) { endGame("VICTORY!"); return; }
                initLevel(false); 
                return; 
            }

            changingDirection = false;
            
            // Apply speed modifiers
            let currentSpeed = baseGameSpeed;
            if (activeEffect.ticksRemaining > 0) {
                if (activeEffect.type === 'slow') currentSpeed *= 1.8;
                if (activeEffect.type === 'fast') currentSpeed *= 0.5;
                activeEffect.ticksRemaining--;
                if (activeEffect.ticksRemaining <= 0) activeEffect.type = null;
            }

            // Periodically save state in background (every ~20 ticks)
            if (tickCounter % 20 === 0) saveState();

            gameLoop = setTimeout(function onTick() {
                if (isPaused) return; 
                tickCounter++;
                drawBackground();
                updateMovingObstacles();
                drawObstacles();
                drawPowerUp();
                drawFood();
                advanceSnake();
                drawSnake();
                
                if (hasGameEnded()) {
                    endGame("GAME OVER");
                    return;
                }
                main();
            }, currentSpeed);
        }

        function showPauseMenu(title) {
            overlayTitle.innerText = title;
            finalScoreText.style.display = "none";
            btnResume.style.display = "inline-block";
            overlay.style.display = "flex";
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            
            if (isPaused) {
                clearTimeout(gameLoop);
                showPauseMenu("PAUSED");
                saveState();
            } else {
                overlay.style.display = "none";
                main();
            }
        }

        function endGame(title) {
            isGameOver = true;
            clearTimeout(gameLoop);
            localStorage.removeItem('snakeSaveData'); // Clear save on death
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('high-score').innerText = highScore;
            }

            overlayTitle.innerText = title;
            finalScoreText.innerText = "FINAL SCORE: " + score;
            finalScoreText.style.display = "block";
            btnResume.style.display = "none";
            overlay.style.display = "flex";
        }

        function initLevel(isFullReset = true) {
            clearTimeout(gameLoop);
            levelScore = 0;
            currentPowerUp = null;
            activeEffect = { type: null, ticksRemaining: 0 };
            document.getElementById('level').innerText = level;
            
            const currentBiome = biomes[(level - 1) % biomes.length];
            generateBackgroundPattern(currentBiome);
            
            baseGameSpeed = Math.max(45, 110 - (level * 1.2)); 
            
            if (isFullReset) {
                snake = [{x: 200, y: 200}, {x: 190, y: 200}, {x: 180, y: 200}];
                dx = 10; dy = 0; growQueue = 0;
            }
            
            generateHardObstacles();
            genFood();
            main();
        }

        function drawBackground() {
            ctx.fillStyle = bgPattern;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            const currentBiome = biomes[(level - 1) % biomes.length];
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? currentBiome.snakeHead : currentBiome.snakeBody;
                
                // Ghost effect makes snake slightly transparent
                if (activeEffect.type === 'ghost' && activeEffect.ticksRemaining > 0) {
                    ctx.globalAlpha = 0.8;
                }
                
                ctx.beginPath();
                ctx.roundRect(part.x, part.y, 10, 10, 3);
                ctx.fill();

                if (index === 0) {
                    ctx.fillStyle = "white";
                    if (dx === 10) { ctx.fillRect(part.x+6, part.y+2, 2, 2); ctx.fillRect(part.x+6, part.y+6, 2, 2); }
                    else if (dx === -10) { ctx.fillRect(part.x+2, part.y+2, 2, 2); ctx.fillRect(part.x+2, part.y+6, 2, 2); }
                    else if (dy === 10) { ctx.fillRect(part.x+2, part.y+6, 2, 2); ctx.fillRect(part.x+6, part.y+6, 2, 2); }
                    else if (dy === -10) { ctx.fillRect(part.x+2, part.y+2, 2, 2); ctx.fillRect(part.x+6, part.y+2, 2, 2); }
                }
                ctx.globalAlpha = 1.0;
            });
        }

        function drawObstacles() {
            // If ghost powerup active, obstacles become heavily transparent
            if (activeEffect.type === 'ghost' && activeEffect.ticksRemaining > 0) {
                ctx.globalAlpha = 0.25;
            }

            obstacles.forEach(obs => {
                ctx.fillStyle = "#95a5a6";
                ctx.fillRect(obs.x, obs.y, 10, 10);
                ctx.fillStyle = "#bdc3c7";
                ctx.fillRect(obs.x, obs.y, 10, 2);
                ctx.fillRect(obs.x, obs.y, 2, 10);
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(obs.x, obs.y+8, 10, 2);
                ctx.fillRect(obs.x+8, obs.y, 2, 10);
            });

            movingObstacles.forEach(mo => {
                ctx.fillStyle = "#e74c3c";
                ctx.beginPath();
                ctx.arc(mo.x + 5, mo.y + 5, 4, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.fillRect(mo.x+4, mo.y, 2, 2);
                ctx.fillRect(mo.x+4, mo.y+8, 2, 2);
                ctx.fillRect(mo.x, mo.y+4, 2, 2);
                ctx.fillRect(mo.x+8, mo.y+4, 2, 2);
            });

            ctx.globalAlpha = 1.0;
        }

        function drawPowerUp() {
            if (!currentPowerUp) return;
            
            let color;
            if (currentPowerUp.type === 'grow') color = "#e74c3c"; // Red
            else if (currentPowerUp.type === 'shrink') color = "#3498db"; // Blue
            else if (currentPowerUp.type === 'fast') color = "#f1c40f"; // Yellow
            else if (currentPowerUp.type === 'slow') color = "#00ffff"; // Cyan
            else if (currentPowerUp.type === 'ghost') color = "#ffffff"; // White

            // Pulsing effect
            let pulse = Math.abs(Math.sin(tickCounter * 0.2)) * 3;
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(currentPowerUp.x + 5, currentPowerUp.y + 5, 4 + pulse, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // reset
        }

        function drawFood() {
            const currentBiome = biomes[(level - 1) % biomes.length];
            const isLastFruit = (levelScore === 90);
            
            let scale = 1;
            let pulseOffset = 0;
            
            if (isLastFruit) {
                scale = 1.5; // Make it 50% bigger
                pulseOffset = Math.abs(Math.sin(tickCounter * 0.15)) * 2; // Pulsing effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#f1c40f";
            }

            // Center alignment based on scale
            let cx = foodX + 5;
            let cy = foodY + 5;
            let r = (4 * scale) + pulseOffset;

            ctx.fillStyle = currentBiome.food; 
            ctx.beginPath();
            ctx.arc(cx, cy + (1*scale), r, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = currentBiome.foodLeaf; 
            ctx.beginPath();
            ctx.ellipse(cx + (2*scale), cy - (3*scale), 3*scale, 1.5*scale, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0; // reset
        }

        function advanceSnake() {
            let head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0) head.x = canvas.width - 10;
            else if (head.x >= canvas.width) head.x = 0;
            
            if (head.y < 0) head.y = canvas.height - 10;
            else if (head.y >= canvas.height) head.y = 0;

            snake.unshift(head);

            // Food collision
            if (head.x === foodX && head.y === foodY) {
                score += 10;
                levelScore += 10;
                document.getElementById('score').innerText = score;
                
                // 25% chance to spawn a powerup if one doesn't exist
                if (!currentPowerUp && Math.random() < 0.25 && levelScore < 90) {
                    genPowerUp();
                }
                
                if (levelScore < 100) genFood();
            } else if (growQueue > 0) {
                // If growing from a powerup, don't pop the tail
                growQueue--;
            } else {
                snake.pop();
            }

            // Powerup collision
            if (currentPowerUp && head.x === currentPowerUp.x && head.y === currentPowerUp.y) {
                applyPowerUp(currentPowerUp.type);
                currentPowerUp = null;
            }
        }

        function applyPowerUp(type) {
            if (type === 'shrink') {
                // Cut length in half (keep minimum 3)
                snake = snake.slice(0, Math.max(3, Math.floor(snake.length / 2)));
            } else if (type === 'grow') {
                growQueue += 5; 
            } else {
                // Temporal effects (last for roughly 8-10 seconds depending on speed)
                activeEffect = { type: type, ticksRemaining: 80 };
            }
        }

        function updateMovingObstacles() {
            if (tickCounter % 2 === 0) {
                movingObstacles.forEach(mo => {
                    mo.x += mo.dx;
                    if (mo.x < 0) mo.x = canvas.width - 10;
                    if (mo.x >= canvas.width) mo.x = 0;
                });
            }
        }

        function randomTen(min, max) { return Math.round((Math.random() * (max - min) + min) / 10) * 10; }

        function isOccupied(x, y) {
            let onSnake = snake.some(p => p.x === x && p.y === y);
            let onObstacle = obstacles.some(o => o.x === x && o.y === y);
            let onMoving = movingObstacles.some(m => Math.abs(m.x - x) < 10 && Math.abs(m.y - y) < 10);
            let onFood = (x === foodX && y === foodY); 
            return onSnake || onObstacle || onMoving || onFood;
        }

        function genFood() {
            let newX, newY;
            let attempts = 0;
            
            // Loop until we find a safe spot, cap at 200 attempts to prevent browser freezing
            do {
                newX = randomTen(0, canvas.width - 10);
                newY = randomTen(0, canvas.height - 10);
                attempts++;
            } while (isOccupied(newX, newY) && attempts < 200);
            
            // Only assign to the actual food variables once we know it's a safe spot
            foodX = newX;
            foodY = newY;
        }

        function genPowerUp() {
            let px, py;
            let attempts = 0;
            
            do {
                px = randomTen(0, canvas.width - 10);
                py = randomTen(0, canvas.height - 10);
                attempts++;
            } while (isOccupied(px, py) && attempts < 200);
            
            if (attempts < 200) { // Only spawn if a safe spot was actually found
                let type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                currentPowerUp = { x: px, y: py, type: type };
            }
        }

        function isSafeSpawn(x, y) {
            if (snake.some(p => p.x === x && p.y === y)) return false;
            // Prevent spawning immediately in front of or around the starting snake
            let head = snake[0];
            let dist = Math.abs(head.x - x) + Math.abs(head.y - y);
            if (dist < 50) return false;
            return true;
        }

        function generateHardObstacles() {
            obstacles = [];
            movingObstacles = [];
            let difficulty = Math.floor((level - 1) / 10); 
            
            const add = (x, y) => {
                if (x >= 0 && x < 40 && y >= 0 && y < 40 && isSafeSpawn(x * 10, y * 10)) {
                    obstacles.push({x: x * 10, y: y * 10});
                }
            };

            // Build dense shapes rather than random blocks
            const drawLine = (x1, y1, length, isHorizontal) => {
                for(let i=0; i<length; i++) {
                    if (isHorizontal) add(x1 + i, y1);
                    else add(x1, y1 + i);
                }
            };
            const drawBox = (x, y, w, h) => {
                drawLine(x, y, w, true); drawLine(x, y+h-1, w, true);
                drawLine(x, y, h, false); drawLine(x+w-1, y, h, false);
            };

            if (difficulty === 0) {
                // Tier 1: Small random walls
                for(let i=0; i<5; i++) drawLine(Math.floor(Math.random()*35), Math.floor(Math.random()*35), 4, Math.random()>0.5);
            } else if (difficulty === 1) {
                // Tier 2: Corner L-shapes
                drawLine(2, 2, 10, true); drawLine(2, 2, 10, false);
                drawLine(28, 37, 10, true); drawLine(37, 28, 10, false);
                drawLine(28, 2, 10, true); drawLine(37, 2, 10, false);
            } else if (difficulty === 2) {
                // Tier 3: Dense Corridors
                drawLine(8, 0, 15, false); drawLine(32, 25, 15, false);
                drawLine(15, 15, 10, true); drawLine(15, 25, 10, true);
            } else if (difficulty === 3) {
                // Tier 4: Concentric broken boxes
                drawBox(5, 5, 30, 30);
                // Break holes so snake can pass
                obstacles = obstacles.filter(o => !(o.x === 200 && o.y === 50) && !(o.x === 200 && o.y === 340));
            } else if (difficulty === 4) {
                // Tier 5: Plus signs
                for(let mx of [10, 30]) {
                    for(let my of [10, 30]) {
                        drawLine(mx-3, my, 7, true); drawLine(mx, my-3, 7, false);
                    }
                }
            } else if (difficulty >= 5) {
                // Tier 6+: Heavy Mazes
                for(let i=0; i<8; i++) {
                    let rx = Math.floor(Math.random()*30);
                    let ry = Math.floor(Math.random()*30);
                    drawLine(rx, ry, Math.floor(Math.random()*6)+4, Math.random()>0.5);
                    drawLine(rx, ry, Math.floor(Math.random()*6)+4, Math.random()>0.5);
                }
            }

            // Moving Spikes
            if (difficulty >= 2) {
                let numCrawlers = difficulty * 2; 
                for(let i=0; i < numCrawlers; i++) {
                    let mx, my;
                    do {
                        mx = randomTen(0, canvas.width - 10);
                        my = randomTen(0, canvas.height - 10);
                    } while (!isSafeSpawn(mx, my));
                    
                    movingObstacles.push({ x: mx, y: my, dx: Math.random() > 0.5 ? 10 : -10 });
                }
            }
        }

        function changeDirection(event) {
            if (isPaused) return;
            const LEFT_KEY = 37, RIGHT_KEY = 39, UP_KEY = 38, DOWN_KEY = 40;

            if (changingDirection) return;
            const keyPressed = event.keyCode;
            const goingUp = dy === -10, goingDown = dy === 10, goingRight = dx === 10, goingLeft = dx === -10;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -10; dy = 0; changingDirection = true; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -10; changingDirection = true; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 10; dy = 0; changingDirection = true; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 10; changingDirection = true; }
        }

        function hasGameEnded() {
            // Self-collision (always active)
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            
            // Wall/Spike collision (bypassed if Ghost powerup is active)
            if (activeEffect.type !== 'ghost' || activeEffect.ticksRemaining <= 0) {
                for (let i = 0; i < obstacles.length; i++) {
                    if (obstacles[i].x === snake[0].x && obstacles[i].y === snake[0].y) return true;
                }
                for (let i = 0; i < movingObstacles.length; i++) {
                    if (movingObstacles[i].x === snake[0].x && movingObstacles[i].y === snake[0].y) return true;
                }
            }
            return false;
        }

        function resetGame() {
            overlay.style.display = "none";
            isGameOver = false;
            isPaused = false;
            level = 1;
            score = 0;
            document.getElementById('score').innerText = score;
            localStorage.removeItem('snakeSaveData');
            initLevel(true);
        }
    </script>
</body>
</html>
